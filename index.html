<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>העובדה היומית</title>

  <meta property="og:type"         content="website" />
  <meta property="og:site_name"    content="העובדה היומית · 200Apps" />
  <meta property="og:title"        content="🏛️ המהפכה מתחילה במפץ גדול (ובצרפתית)" />
  <meta property="og:description"  content="לואי ה-16 רצה רק לפתור בעיות תקציב. זה נגמר עם כמה ראשים שהתגלגלו 🗼" />
  <meta property="og:url"          content="https://gadpal.github.io/daily-fact/" />
  <meta property="og:image"        content="https://gadpal.github.io/daily-fact/daily_fact.png" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card"        content="summary_large_image" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;700;900&family=Heebo:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

  <!-- ============================================================
       DAILY CONTENT — edit ONLY this block each day
       ============================================================ -->
  <script>
    const daily = {
      number: "03",

      tag: {
        he: "🏛️ היסטוריה",
        en: "🏛️ History"
      },

      title: {
        he: "המהפכה מתחילה במפץ גדול (ובצרפתית)",
        en: "The Revolution Starts with a Big Bang"
      },

      body: {
        he: "היום בשנת 1789, נפתחה בצרפת 'אספת המעמדות', האירוע שבעצם נתן את הירייה הראשונה למהפכה הצרפתית. המלך לואי ה-16 בסך הכל רצה לפתור בעיות תקציב, אבל הנציגים של העם החליטו שנמאס להם לאכול פירורים בזמן שהאצולה חוגגת על הבאגטים. זה נגמר בשינוי פני ההיסטוריה המודרנית, ובכמה ראשים שהתגלגלו בדרך.",
        en: "Today in 1789, the Estates-General opened in France — the event that essentially fired the starting pistol for the French Revolution. King Louis XVI just wanted to fix some budget issues, but the commoners decided they were done eating crumbs while the nobility partied on brioche. It ended up changing the face of modern history, and caused a few heads to roll along the way."
      },

      youtube: {
        url:    "https://youtu.be/wXsZbkt0yqo?si=6f1heVg_T0s7kGGl",
        song:   "Franch Revolution; Bad Romance",
        artist: "Lady Gaga"
      },

      funny: {
        he: "לואי ה-16 כתב ביומן שלו באותו יום את המילה 'Rien' (כלומר: כלום), כי הוא פשוט לא הצליח לצוד שום דבר באותו בוקר. כנראה שספספוס של צבי היה חשוב לו יותר מהתמוטטות המלוכה שלו.",
        en: "Louis XVI wrote the word 'Rien' (Nothing) in his diary that day, simply because he didn\'t manage to hunt anything that morning. Apparently, missing a deer was more noteworthy to him than his monarchy collapsing."
      },

      deep: {
        he: "למרות שהמהפכה מזוהה עם דמוקרטיה וחופש, היא הולידה את 'שלטון הטרור', שבו כמעט 17,000 איש הוצאו להורג באופן רשמי. הגיליוטינה נחשבה אז לדרך 'הומנית' ושוויונית למות, כי היא לא הבדילה בין צוואר של איכר לצוואר של אציל.",
        en: "While the Revolution is a symbol of democracy and freedom, it gave birth to the Reign of Terror, where nearly 17,000 people were officially executed. Back then, the guillotine was actually considered a humane and egalitarian way to die — because it didn\'t discriminate between the neck of a peasant and that of a prince."
      }
    };
  </script>
  <!-- ============================================================ -->

  <style>
    :root {
      --cream:       #f7f3ee;
      --warm-white:  #fffefb;
      --ink:         #2b1f14;
      --soft-ink:    #4a3728;
      --muted:       #9c8a7a;
      --accent:      #7a4a2c;
      --accent-mid:  #a0622e;
      --accent-light:#c89070;
      --rule:        #ddd0c0;
      --card-bg:     #ffffff;
      --shadow:      0 2px 28px rgba(43,31,20,0.10);

      --font-display-he: 'Frank Ruhl Libre', serif;
      --font-body-he:    'Heebo', sans-serif;
      --font-display-en: 'Playfair Display', serif;
      --font-body-en:    'Lato', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--font-body-he);
      min-height: 100vh;
      direction: rtl;
    }
    body.en {
      font-family: var(--font-body-en);
      direction: ltr;
    }

    .banner-wrap {
      width: 100%; height: 200px;
      background: linear-gradient(120deg, #2b1f14 0%, #5a3520 55%, #a0622e 100%);
      position: relative; overflow: hidden;
    }
    .banner-wrap img.banner-img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }

    .page-wrap { max-width: 780px; margin: 0 auto; padding: 0 28px 60px; }

    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 0 12px;
    }
    .top-bar-right { display: flex; align-items: center; gap: 10px; }

    .tag-badge {
      background: var(--accent); color: #fff;
      padding: 5px 14px; border-radius: 999px;
      font-size: 0.78rem; font-weight: 700;
    }
    .date-stamp { font-size: 0.78rem; color: var(--muted); }

    .lang-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 20px;
      padding: 6px 16px; font-size: 0.78rem; font-weight: 600;
      cursor: pointer; letter-spacing: 1px;
      transition: background 0.2s, transform 0.15s;
    }
    .lang-btn:hover { background: var(--accent-mid); transform: scale(1.04); }

    .yt-row { display: flex; justify-content: center; margin-bottom: 24px; }
    .yt-btn {
      display: inline-flex; align-items: center; gap: 12px;
      background: var(--warm-white); border: 1.5px solid var(--rule);
      border-radius: 14px; padding: 12px 22px;
      text-decoration: none; color: var(--soft-ink);
      box-shadow: var(--shadow); max-width: 420px; width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .yt-btn:hover {
      border-color: #cc2200;
      box-shadow: 0 4px 22px rgba(204,34,0,0.14);
      transform: translateY(-2px);
    }
    .yt-icon {
      width: 32px; height: 32px; flex-shrink: 0;
      background: #ff0000; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .yt-icon svg { width: 16px; height: 16px; fill: #fff; }
    .yt-label { display: flex; flex-direction: column; line-height: 1.35; overflow: hidden; }
    .yt-caption { font-size: 0.7rem; color: var(--muted); }
    .yt-song-name { font-size: 0.92rem; font-weight: 700; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .yt-artist { font-size: 0.78rem; color: var(--muted); }

    .divider {
      border: none; border-top: 1.5px solid var(--rule);
      margin: 0 0 28px; position: relative;
    }
    .divider::after {
      content: '◆'; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: var(--cream); color: var(--accent-light);
      font-size: 0.55rem; padding: 0 12px;
    }

    .fact-card {
      background: var(--card-bg); border-radius: 18px;
      padding: 36px 40px 28px;
      box-shadow: var(--shadow); border: 1px solid var(--rule);
      animation: fadeUp 0.5s ease both;
      position: relative; overflow: hidden;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fact-bg-number {
      position: absolute; bottom: -10px; left: 20px;
      font-family: var(--font-display-he);
      font-size: 8rem; font-weight: 900;
      color: var(--rule); opacity: 0.5;
      line-height: 1; user-select: none; pointer-events: none; z-index: 0;
    }
    body.en .fact-bg-number { right: 20px; left: auto; }
    .fact-content { position: relative; z-index: 1; }

    .fact-kicker {
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 3px; color: var(--accent-mid);
      text-transform: uppercase; margin-bottom: 10px;
    }
    .fact-title {
      font-family: var(--font-display-he);
      font-size: 1.65rem; font-weight: 700; line-height: 1.45;
      color: var(--ink); margin-bottom: 18px;
    }
    body.en .fact-title { font-family: var(--font-display-en); font-style: italic; }

    .fact-body {
      font-size: 1rem; line-height: 1.9;
      color: var(--soft-ink); font-weight: 300; margin-bottom: 26px;
    }

    .extras-strip {
      display: flex; gap: 10px; flex-wrap: wrap;
      padding-top: 20px; border-top: 1px solid var(--rule);
    }
    .extra-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 18px; border-radius: 22px;
      border: 1.5px solid var(--rule); background: transparent;
      cursor: pointer; font-size: 0.82rem; font-weight: 500;
      color: var(--soft-ink); font-family: inherit;
      transition: all 0.18s;
    }
    .extra-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; transform: translateY(-1px); }

    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(43,31,20,0.55); z-index: 100;
      backdrop-filter: blur(4px);
      align-items: center; justify-content: center; padding: 24px;
    }
    .overlay.active { display: flex; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .popup {
      background: var(--warm-white); border-radius: 20px;
      max-width: 460px; width: 100%; padding: 38px 32px 30px;
      position: relative; box-shadow: 0 24px 64px rgba(43,31,20,0.28);
      animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn { from { opacity: 0; transform: scale(0.88); } to { opacity: 1; transform: scale(1); } }
    .popup-close {
      position: absolute; top: 14px; left: 14px;
      background: var(--rule); border: none; border-radius: 50%;
      width: 30px; height: 30px; font-size: 0.95rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--muted); transition: background 0.15s;
    }
    body.en .popup-close { right: 14px; left: auto; }
    .popup-close:hover { background: var(--accent); color: #fff; }
    .popup-emoji { font-size: 2.6rem; margin-bottom: 10px; text-align: center; }
    .popup-title {
      font-family: var(--font-display-he); font-size: 1.2rem; font-weight: 700;
      margin-bottom: 12px; color: var(--ink); text-align: center;
    }
    body.en .popup-title { font-family: var(--font-display-en); }
    .popup-body { font-size: 0.95rem; line-height: 1.78; color: var(--soft-ink); font-weight: 300; text-align: center; }

    .footer { text-align: center; margin-top: 30px; font-size: 0.72rem; color: var(--muted); }

    @media (min-width: 640px) {
      .banner-wrap { height: 230px; }
      .fact-card { padding: 44px 48px 34px; }
      .fact-title { font-size: 1.9rem; }
      .fact-body { font-size: 1.05rem; }
      .fact-bg-number { font-size: 10rem; }
      .yt-btn { width: auto; }
    }

    @media (max-width: 480px) {
      .page-wrap { padding: 0 16px 48px; }
      .banner-wrap { height: 170px; }
      .fact-card { padding: 28px 22px 22px; }
      .fact-title { font-size: 1.35rem; }
      .fact-bg-number { font-size: 6rem; }
    }
  </style>
</head>
<body>

  <div class="banner-wrap">
    <img class="banner-img"
         src="https://gadpal.github.io/daily-fact/daily_fact.png"
         alt="העובדה היומית">
  </div>

  <div class="page-wrap">

    <div class="top-bar">
      <div class="top-bar-right">
        <div class="tag-badge" id="tag"></div>
        <div class="date-stamp" id="datestamp"></div>
      </div>
      <button class="lang-btn" onclick="toggleLang()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <span id="lang-label">EN</span>
      </button>
    </div>

    <div class="yt-row">
      <a class="yt-btn" id="yt-link" href="#" target="_blank" rel="noopener">
        <div class="yt-icon">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <div class="yt-label">
          <span class="yt-caption" id="yt-caption"></span>
          <span class="yt-song-name" id="yt-song"></span>
          <span class="yt-artist" id="yt-artist"></span>
        </div>
      </a>
    </div>

    <hr class="divider" />

    <div class="fact-card">
      <div class="fact-bg-number" id="bg-number"></div>
      <div class="fact-content">
        <div class="fact-kicker" id="kicker"></div>
        <div class="fact-title" id="fact-title"></div>
        <div class="fact-body" id="fact-body"></div>
        <div class="extras-strip">
          <button class="extra-btn" onclick="openPopup('funny')" id="btn-funny"></button>
          <button class="extra-btn" onclick="openPopup('deep')" id="btn-deep"></button>
        </div>
      </div>
    </div>

    <div class="footer" id="footer"></div>
  </div>

  <div class="overlay" id="popup-funny" onclick="closeOnOverlay(event,'funny')">
    <div class="popup">
      <button class="popup-close" onclick="closePopup('funny')">✕</button>
      <div class="popup-emoji">🤣</div>
      <div class="popup-title" id="popup-funny-title"></div>
      <div class="popup-body" id="popup-funny-body"></div>
    </div>
  </div>

  <div class="overlay" id="popup-deep" onclick="closeOnOverlay(event,'deep')">
    <div class="popup">
      <button class="popup-close" onclick="closePopup('deep')">✕</button>
      <div class="popup-emoji">🧠</div>
      <div class="popup-title" id="popup-deep-title"></div>
      <div class="popup-body" id="popup-deep-body"></div>
    </div>
  </div>

  <script>
    let isHe = true;

    const t = {
      he: {
        ytCaption:       "🎵 שיר היום",
        kicker:          "העובדה היומית",
        btnFunny:        "😄 עובדה מצחיקה",
        btnDeep:         "🔍 לעומק",
        popupFunnyTitle: "עובדה מצחיקה",
        popupDeepTitle:  "לעומק",
        footer:          "200Apps · עובדה יומית · נוצר על ידי AI, נערך בידי אדם"
      },
      en: {
        ytCaption:       "🎵 Song of the Day",
        kicker:          "FACT OF THE DAY",
        btnFunny:        "😄 Funny Fact",
        btnDeep:         "🔍 Go Deeper",
        popupFunnyTitle: "Funny Fact",
        popupDeepTitle:  "Go Deeper",
        footer:          "200Apps · Daily Fact · AI-generated, human-edited"
      }
    };

    function render() {
      const lang       = isHe ? 'he' : 'en';
      const ui         = isHe ? t.he : t.en;
      const dateLocale = isHe ? 'he-IL' : 'en-US';

      document.documentElement.lang = lang;
      document.documentElement.dir  = isHe ? 'rtl' : 'ltr';
      document.body.classList.toggle('en', !isHe);
      document.getElementById('lang-label').textContent = isHe ? 'EN' : 'HE';

      document.getElementById('datestamp').textContent =
        new Date().toLocaleDateString(dateLocale, { weekday:'long', day:'numeric', month:'long' });

      document.getElementById('tag').textContent        = daily.tag[lang];
      document.getElementById('yt-caption').textContent = ui.ytCaption;
      document.getElementById('yt-song').textContent    = daily.youtube.song;
      document.getElementById('yt-artist').textContent  = daily.youtube.artist;
      document.getElementById('yt-link').href           = daily.youtube.url;

      document.getElementById('bg-number').textContent  = daily.number;
      document.getElementById('kicker').textContent     = ui.kicker + " #" + daily.number;
      document.getElementById('fact-title').textContent = daily.title[lang];
      document.getElementById('fact-body').textContent  = daily.body[lang];

      document.getElementById('btn-funny').textContent  = ui.btnFunny;
      document.getElementById('btn-deep').textContent   = ui.btnDeep;

      document.getElementById('popup-funny-title').textContent = ui.popupFunnyTitle;
      document.getElementById('popup-funny-body').textContent  = daily.funny[lang];
      document.getElementById('popup-deep-title').textContent  = ui.popupDeepTitle;
      document.getElementById('popup-deep-body').textContent   = daily.deep[lang];

      document.getElementById('footer').textContent = ui.footer;
    }

    function toggleLang() { isHe = !isHe; render(); }

    function openPopup(id) {
      document.getElementById('popup-' + id).classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closePopup(id) {
      document.getElementById('popup-' + id).classList.remove('active');
      document.body.style.overflow = '';
    }
    function closeOnOverlay(e, id) {
      if (e.target === document.getElementById('popup-' + id)) closePopup(id);
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.overlay.active').forEach(el => el.classList.remove('active'));
        document.body.style.overflow = '';
      }
    });

    render();
  </script>
</body>
</html>
